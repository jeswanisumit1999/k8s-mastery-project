apiVersion: v1
kind: Pod
metadata:
  name: backend-pod
  labels:
    app: backend
spec:
  nodeSelector:
    kubernetes.io/hostname: node01
  containers:
  - name: backend
    image: docker.io/library/k8s-demo-backend:v1
    imagePullPolicy: Never
    env:
    - name: DB_HOST
      value: "<POSTGRES_POD_IP>"     # replace with the DB pod IP
    - name: DB_NAME
      value: "itemsdb"
    - name: DB_USER
      value: "postgres"
    - name: DB_PASSWORD
      value: "postgres"
    ports:
    - containerPort: 3000
